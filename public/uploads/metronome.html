<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #faf5ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .app { text-align: center; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 320px; }
  h1 { color: #9333ea; font-size: 20px; margin-bottom: 24px; }
  .bpm { font-size: 64px; font-weight: 700; color: #1e293b; }
  .bpm-label { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
  .slider { width: 100%; margin: 16px 0; accent-color: #9333ea; }
  .dot { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; margin: 0 auto 20px; transition: background 0.1s; }
  .dot.active { background: #9333ea; box-shadow: 0 0 20px rgba(147,51,234,0.4); }
  .buttons { display: flex; gap: 10px; justify-content: center; }
  button { padding: 12px 28px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
  .play { background: #9333ea; color: white; }
  .play:hover { background: #7e22ce; }
  .stop { background: #f1f5f9; color: #64748b; }
</style>
</head>
<body>
<div class="app">
  <h1>Metronome</h1>
  <div class="dot" id="dot"></div>
  <div class="bpm" id="bpmDisplay">120</div>
  <div class="bpm-label">BPM</div>
  <input type="range" min="40" max="240" value="120" class="slider" id="bpmSlider" oninput="changeBPM(this.value)">
  <div class="buttons">
    <button class="play" id="playBtn" onclick="toggle()">Start</button>
    <button class="stop" onclick="tapTempo()">Tap Tempo</button>
  </div>
</div>
<script>
  let bpm = 120, interval = null, playing = false, audioCtx = null;
  const dot = document.getElementById('dot');
  const playBtn = document.getElementById('playBtn');
  const bpmDisplay = document.getElementById('bpmDisplay');

  function changeBPM(val) { bpm = parseInt(val); bpmDisplay.textContent = bpm; if (playing) { clearInterval(interval); startInterval(); } }
  function click() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    dot.classList.add('active'); setTimeout(() => dot.classList.remove('active'), 100);
  }
  function startInterval() { interval = setInterval(click, 60000 / bpm); }
  function toggle() {
    if (playing) { clearInterval(interval); playBtn.textContent = 'Start'; playing = false; }
    else { click(); startInterval(); playBtn.textContent = 'Stop'; playing = true; }
  }
  let taps = [];
  function tapTempo() {
    const now = Date.now(); taps.push(now);
    if (taps.length > 4) taps = taps.slice(-4);
    if (taps.length >= 2) {
      const avg = (taps[taps.length-1] - taps[0]) / (taps.length - 1);
      const newBpm = Math.round(60000 / avg);
      if (newBpm >= 40 && newBpm <= 240) { bpm = newBpm; bpmDisplay.textContent = bpm; document.getElementById('bpmSlider').value = bpm; if (playing) { clearInterval(interval); startInterval(); } }
    }
  }
</script>
</body>
</html>
