<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #fef2f2; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { color: #dc2626; font-size: 20px; margin-bottom: 8px; }
  .timer { font-size: 72px; font-weight: 700; color: #1e293b; margin: 20px 0; font-variant-numeric: tabular-nums; }
  .label { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
  .buttons { display: flex; gap: 10px; justify-content: center; }
  button { padding: 12px 28px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.15s; }
  .start { background: #dc2626; color: white; }
  .start:hover { background: #b91c1c; }
  .reset { background: #f1f5f9; color: #64748b; }
  .reset:hover { background: #e2e8f0; }
  .modes { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .mode { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; background: #fef2f2; color: #dc2626; font-weight: 500; }
  .mode.active { background: #dc2626; color: white; }
</style>
</head>
<body>
<div class="container">
  <h1>Pomodoro Timer</h1>
  <div class="modes">
    <button class="mode active" onclick="setMode(25,'Focus')">Focus</button>
    <button class="mode" onclick="setMode(5,'Short Break')">Short Break</button>
    <button class="mode" onclick="setMode(15,'Long Break')">Long Break</button>
  </div>
  <div class="label" id="modeLabel">Focus Time</div>
  <div class="timer" id="timer">25:00</div>
  <div class="buttons">
    <button class="start" id="startBtn" onclick="toggle()">Start</button>
    <button class="reset" onclick="reset()">Reset</button>
  </div>
</div>
<script>
  let totalSeconds = 25 * 60, remaining = totalSeconds, interval = null, running = false;
  const timerEl = document.getElementById('timer');
  const startBtn = document.getElementById('startBtn');
  const modeLabel = document.getElementById('modeLabel');

  function display() {
    const m = Math.floor(remaining / 60), s = remaining % 60;
    timerEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function toggle() {
    if (running) { clearInterval(interval); startBtn.textContent = 'Start'; running = false; }
    else { interval = setInterval(() => { if (remaining > 0) { remaining--; display(); } else { clearInterval(interval); running = false; startBtn.textContent = 'Start'; } }, 1000); startBtn.textContent = 'Pause'; running = true; }
  }
  function reset() { clearInterval(interval); running = false; remaining = totalSeconds; display(); startBtn.textContent = 'Start'; }
  function setMode(min, label) {
    totalSeconds = min * 60; reset(); modeLabel.textContent = label + ' Time';
    document.querySelectorAll('.mode').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }
</script>
</body>
</html>
