<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Maker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #eff6ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .app { max-width: 500px; width: 100%; }
  h1 { color: #1d4ed8; font-size: 22px; text-align: center; margin-bottom: 20px; }
  .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; margin-bottom: 16px; transition: transform 0.3s; }
  .card:hover { transform: scale(1.02); }
  .card .front { font-size: 24px; font-weight: 600; color: #1e293b; }
  .card .back { font-size: 18px; color: #6366f1; }
  .hint { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 16px; }
  .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .nav button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; background: #dbeafe; color: #1d4ed8; font-size: 14px; }
  .nav button:hover { background: #bfdbfe; }
  .counter { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 20px; }
  .add-form { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .add-form h2 { font-size: 16px; color: #1e293b; margin-bottom: 12px; }
  .add-form input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 8px; }
  .add-form button { width: 100%; padding: 10px; background: #1d4ed8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <h1>Flashcard Maker</h1>
  <div class="counter" id="counter">Card 1 of 3</div>
  <div class="card" id="card" onclick="flip()">
    <div class="front" id="cardText">What is the capital of France?</div>
  </div>
  <div class="hint">Click the card to flip</div>
  <div class="nav">
    <button onclick="prev()">Previous</button>
    <button onclick="next()">Next</button>
    <button onclick="shuffle()">Shuffle</button>
  </div>
  <div class="add-form">
    <h2>Add a Card</h2>
    <input id="q" placeholder="Question (front)">
    <input id="a" placeholder="Answer (back)">
    <button onclick="addCard()">Add Card</button>
  </div>
</div>
<script>
  let cards = [
    { q: 'What is the capital of France?', a: 'Paris' },
    { q: 'What year did World War II end?', a: '1945' },
    { q: 'What is H2O?', a: 'Water' },
  ];
  let idx = 0, flipped = false;
  const cardEl = document.getElementById('card');
  const textEl = document.getElementById('cardText');
  const counterEl = document.getElementById('counter');

  function render() {
    flipped = false;
    textEl.textContent = cards[idx].q;
    textEl.className = 'front';
    counterEl.textContent = `Card ${idx + 1} of ${cards.length}`;
  }
  function flip() {
    flipped = !flipped;
    textEl.textContent = flipped ? cards[idx].a : cards[idx].q;
    textEl.className = flipped ? 'back' : 'front';
  }
  function next() { idx = (idx + 1) % cards.length; render(); }
  function prev() { idx = (idx - 1 + cards.length) % cards.length; render(); }
  function shuffle() { cards.sort(() => Math.random() - 0.5); idx = 0; render(); }
  function addCard() {
    const q = document.getElementById('q').value.trim();
    const a = document.getElementById('a').value.trim();
    if (q && a) { cards.push({ q, a }); document.getElementById('q').value = ''; document.getElementById('a').value = ''; render(); idx = cards.length - 1; render(); }
  }
</script>
</body>
</html>
