<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #faf5ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .app { max-width: 500px; width: 100%; text-align: center; }
  h1 { color: #7c3aed; font-size: 22px; margin-bottom: 20px; }
  .palette { display: flex; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); margin-bottom: 20px; height: 200px; }
  .swatch { flex: 1; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; transition: flex 0.3s; }
  .swatch:hover { flex: 1.3; }
  .swatch span { background: rgba(0,0,0,0.3); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
  button { padding: 14px 32px; background: #7c3aed; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.15s; }
  button:hover { background: #6d28d9; }
  .copied { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
  .copied.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <h1>Color Palette Generator</h1>
  <div class="palette" id="palette"></div>
  <button onclick="generate()">Generate New Palette</button>
  <div class="copied" id="copied">Copied!</div>
</div>
<script>
  function hsl(h, s, l) { return `hsl(${h}, ${s}%, ${l}%)`; }
  function generate() {
    const palette = document.getElementById('palette');
    palette.innerHTML = '';
    const baseHue = Math.random() * 360;
    for (let i = 0; i < 5; i++) {
      const h = (baseHue + i * 30 + Math.random() * 20) % 360;
      const s = 50 + Math.random() * 40;
      const l = 35 + Math.random() * 40;
      const color = hsl(h, s, l);
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.background = color;
      const hex = hslToHex(h, s, l);
      div.innerHTML = `<span>${hex}</span>`;
      div.onclick = () => { navigator.clipboard.writeText(hex); const c = document.getElementById('copied'); c.classList.add('show'); setTimeout(() => c.classList.remove('show'), 1200); };
      palette.appendChild(div);
    }
  }
  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
    return '#' + [f(0), f(8), f(4)].map(x => Math.round(x * 255).toString(16).padStart(2, '0')).join('');
  }
  generate();
</script>
</body>
</html>
