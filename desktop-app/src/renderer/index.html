<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolfolk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; height: 100vh; display: flex; flex-direction: column; -webkit-app-region: drag; }
  button, input, a { -webkit-app-region: no-drag; }

  /* Top bar */
  .topbar { background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .topbar .logo { font-weight: 700; font-size: 16px; color: #4f46e5; }
  .topbar nav { display: flex; gap: 4px; flex: 1; }
  .topbar nav button { padding: 6px 14px; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; }
  .topbar nav button.active { background: #eef2ff; color: #4f46e5; }
  .topbar nav button:hover:not(.active) { background: #f3f4f6; }
  .topbar .user-info { font-size: 12px; color: #9ca3af; }
  .topbar .logout-btn { padding: 4px 10px; font-size: 12px; border: 1px solid #e5e7eb; background: white; border-radius: 6px; color: #6b7280; cursor: pointer; }

  /* Content area */
  .content { flex: 1; overflow-y: auto; padding: 20px; -webkit-app-region: no-drag; }

  /* Login screen */
  .login-container { display: flex; align-items: center; justify-content: center; height: 100%; }
  .login-box { background: white; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); text-align: center; }
  .login-box h1 { font-size: 24px; margin-bottom: 4px; }
  .login-box .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
  .login-box input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .login-box .login-btn { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .login-box .login-btn:hover { background: #4338ca; }
  .login-box .error { color: #dc2626; font-size: 13px; margin-bottom: 10px; }

  /* Search */
  .search-bar { margin-bottom: 20px; }
  .search-bar input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; }
  .search-bar input:focus { outline: none; border-color: #4f46e5; }

  /* Tool grid */
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .tool-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; cursor: default; }
  .tool-card .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
  .tool-card .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .badge-browser { background: #eef2ff; color: #4f46e5; }
  .badge-desktop { background: #dcfce7; color: #16a34a; }
  .badge-lang { background: #fef9c3; color: #a16207; }
  .tool-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .tool-card .desc { font-size: 13px; color: #6b7280; line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tool-card .meta { font-size: 12px; color: #9ca3af; display: flex; justify-content: space-between; align-items: center; }
  .tool-card .actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn { padding: 7px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.15s; }
  .btn-primary { background: #4f46e5; color: white; }
  .btn-primary:hover { background: #4338ca; }
  .btn-success { background: #16a34a; color: white; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-outline { background: white; color: #374151; border: 1px solid #d1d5db; }
  .btn-outline:hover { background: #f3f4f6; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status messages */
  .status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
  .status-info { background: #eef2ff; color: #4f46e5; }
  .status-success { background: #dcfce7; color: #16a34a; }
  .status-error { background: #fef2f2; color: #dc2626; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty h2 { font-size: 18px; color: #374151; margin-bottom: 8px; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app"></div>

<script>
const API = "https://toolfolk.vercel.app";
let authToken = localStorage.getItem("toolfolk_token") || null;
let currentUser = JSON.parse(localStorage.getItem("toolfolk_user") || "null");
let currentView = "browse";
let tools = [];
let installedLocal = [];
let statusMsg = null;
let searchQuery = "";

// API calls
async function apiFetch(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (authToken) headers["Authorization"] = `Bearer ${authToken}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  return res.json();
}

async function login(email, password) {
  const res = await fetch(`${API}/api/auth/token`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Login failed");
  authToken = data.token;
  currentUser = data.user;
  localStorage.setItem("toolfolk_token", authToken);
  localStorage.setItem("toolfolk_user", JSON.stringify(currentUser));
  return data;
}

function logout() {
  authToken = null;
  currentUser = null;
  localStorage.removeItem("toolfolk_token");
  localStorage.removeItem("toolfolk_user");
  render();
}

async function fetchTools(query = "") {
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(query)}`);
    tools = Array.isArray(data) ? data : [];
  } catch { tools = []; }
}

async function fetchInstalled() {
  try {
    installedLocal = await window.toolfolk.getInstalled();
  } catch { installedLocal = []; }
}

function isInstalled(toolId) {
  return installedLocal.some(t => t.toolId === toolId);
}

async function installTool(tool) {
  statusMsg = { type: "info", text: `Installing ${tool.title}...` };
  render();

  const result = await window.toolfolk.installTool({
    toolId: tool.id,
    downloadUrl: tool.fileUrl,
    language: tool.language,
    entryFile: tool.entryFile,
    dependencies: tool.dependencies,
  });

  if (result.success) {
    // Record on server
    try { await apiFetch(`/api/tools/${tool.id}/install`, { method: "POST" }); } catch {}
    statusMsg = { type: "success", text: `${tool.title} installed!` };
    await fetchInstalled();
  } else {
    statusMsg = { type: "error", text: `Failed: ${result.error}` };
  }
  render();
  setTimeout(() => { statusMsg = null; render(); }, 4000);
}

async function runTool(tool) {
  const meta = installedLocal.find(t => t.toolId === (tool.id || tool.toolId));
  if (!meta) return;
  await window.toolfolk.runTool({
    toolId: meta.toolId,
    language: meta.language,
    entryFile: meta.entryFile,
  });
}

async function uninstallTool(tool) {
  const toolId = tool.id || tool.toolId;
  await window.toolfolk.uninstallTool({ toolId });
  try { await apiFetch(`/api/tools/${toolId}/install`, { method: "DELETE" }); } catch {}
  statusMsg = { type: "success", text: "Uninstalled." };
  await fetchInstalled();
  render();
  setTimeout(() => { statusMsg = null; render(); }, 3000);
}

// Render
function render() {
  const app = document.getElementById("app");

  if (!authToken) {
    app.innerHTML = renderLogin();
    return;
  }

  app.innerHTML = `
    <div class="topbar">
      <span class="logo">&#128295; Toolfolk</span>
      <nav>
        <button class="${currentView === 'browse' ? 'active' : ''}" onclick="switchView('browse')">Browse</button>
        <button class="${currentView === 'library' ? 'active' : ''}" onclick="switchView('library')">My Library</button>
      </nav>
      <span class="user-info">${currentUser?.name || ''}</span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
    <div class="content">
      ${statusMsg ? `<div class="status status-${statusMsg.type}">${statusMsg.text}</div>` : ''}
      ${currentView === 'browse' ? renderBrowse() : renderLibrary()}
    </div>
  `;
}

function renderLogin() {
  return `
    <div class="login-container">
      <div class="login-box">
        <h1>&#128295; Toolfolk</h1>
        <p class="subtitle">Log in with your Toolfolk account</p>
        <div id="login-error"></div>
        <form onsubmit="handleLogin(event)">
          <input type="email" id="login-email" placeholder="Email" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="submit" class="login-btn" id="login-submit">Sign in</button>
        </form>
      </div>
    </div>
  `;
}

function renderBrowse() {
  const filtered = searchQuery
    ? tools.filter(t =>
        t.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        t.description.toLowerCase().includes(searchQuery.toLowerCase())
      )
    : tools;

  return `
    <div class="search-bar">
      <input type="text" placeholder="Search tools..." value="${searchQuery}" oninput="handleSearch(this.value)">
    </div>
    ${filtered.length === 0 ? '<div class="empty"><h2>No tools found</h2><p>Try a different search</p></div>' : ''}
    <div class="tool-grid">
      ${filtered.map(t => renderToolCard(t)).join('')}
    </div>
  `;
}

function renderToolCard(tool) {
  const installed = isInstalled(tool.id);
  const isDesktop = tool.toolType === "desktop";
  const langBadge = tool.language ? `<span class="badge badge-lang">${tool.language}</span>` : '';

  return `
    <div class="tool-card">
      <div class="card-top">
        <span class="badge ${isDesktop ? 'badge-desktop' : 'badge-browser'}">${isDesktop ? 'Desktop' : 'Browser'}</span>
        ${langBadge}
      </div>
      <h3>${escapeHtml(tool.title)}</h3>
      <p class="desc">${escapeHtml(tool.description)}</p>
      <div class="meta">
        <span>by ${escapeHtml(tool.author?.name || 'Unknown')}</span>
        <span>${tool.downloadCount || 0} installs</span>
      </div>
      ${isDesktop ? `
        <div class="actions">
          ${installed
            ? `<button class="btn btn-success" onclick="runTool(${JSON.stringify(tool).replace(/"/g, '&quot;')})">&#9654; Run</button>
               <button class="btn btn-danger" onclick="uninstallTool(${JSON.stringify({id: tool.id}).replace(/"/g, '&quot;')})">Uninstall</button>`
            : `<button class="btn btn-primary" onclick="installTool(${JSON.stringify(tool).replace(/"/g, '&quot;')})">Install</button>`
          }
        </div>
      ` : `
        <div class="actions">
          <button class="btn btn-outline" onclick="window.open('${API}/tool/${tool.id}', '_blank')">View on Web</button>
        </div>
      `}
    </div>
  `;
}

function renderLibrary() {
  if (installedLocal.length === 0) {
    return '<div class="empty"><h2>No programs installed</h2><p>Browse and install tools to see them here</p></div>';
  }

  return `
    <div class="tool-grid">
      ${installedLocal.map(meta => `
        <div class="tool-card">
          <div class="card-top">
            <span class="badge badge-desktop">Desktop</span>
            <span class="badge badge-lang">${meta.language || 'unknown'}</span>
          </div>
          <h3>${escapeHtml(meta.toolId)}</h3>
          <div class="meta">
            <span>Entry: ${meta.entryFile || 'N/A'}</span>
            <span>${new Date(meta.installedAt).toLocaleDateString()}</span>
          </div>
          <div class="actions">
            <button class="btn btn-success" onclick="runTool(${JSON.stringify(meta).replace(/"/g, '&quot;')})">&#9654; Run</button>
            <button class="btn btn-danger" onclick="uninstallTool(${JSON.stringify(meta).replace(/"/g, '&quot;')})">Uninstall</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// Event handlers
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;
  const errDiv = document.getElementById("login-error");
  const btn = document.getElementById("login-submit");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  try {
    await login(email, password);
    await Promise.all([fetchTools(), fetchInstalled()]);
    render();
  } catch (err) {
    errDiv.innerHTML = `<p class="error">${err.message}</p>`;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function switchView(view) {
  currentView = view;
  render();
}

let searchTimeout;
function handleSearch(value) {
  searchQuery = value;
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => render(), 200);
}

// Init
async function init() {
  if (authToken) {
    await Promise.all([fetchTools(), fetchInstalled()]);
  }
  render();
}

init();
</script>
</body>
</html>
